name: Professional Trading System

on:
  schedule:
    # Run Monday-Friday at 10:00 AM EST (15:00 UTC)
    - cron: '0 15 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  trade:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Professional Trading System
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          echo "==================================="
          echo "PROFESSIONAL TRADING SYSTEM"
          echo "==================================="
          echo ""
          
          # Run master bot
          python src/master_bot_v2.py
          
          # Update analytics
          python src/analytics/performance.py
          
          # Fetch positions
          python src/fetch_positions.py
      
      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Trading Bot"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-trade: $(date +'%Y-%m-%d %H:%M:%S')"
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
