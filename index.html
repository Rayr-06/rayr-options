<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAYR Options Pro - Professional Trading System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .health-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .health-score {
            font-size: 80px;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .health-score.green { color: #10b981; }
        .health-score.yellow { color: #f59e0b; }
        .health-score.red { color: #ef4444; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
        }
        
        .card-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        
        .card-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .card-subvalue {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .section {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }
        
        .loading {
            text-align: center;
            padding: 100px;
            font-size: 24px;
        }
        
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .btn {
            background: rgba(255,255,255,0.3);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        
        .btn:hover {
            background: rgba(255,255,255,0.4);
        }
        
        .footer {
            text-align: center;
            opacity: 0.7;
            margin-top: 40px;
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .health-score {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 RAYR OPTIONS PRO</h1>
            <div class="subtitle">Professional Hedge-Fund-Grade Trading System</div>
        </div>
        
        <div id="app">
            <div class="loading">
                <div class="spinner"></div>
                <div>Loading professional trading system...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/Rayr-06/rayr-options/main/data/analytics.json?t=' + Date.now());
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('app').innerHTML = `
                    <div class="section">
                        <h2>⚠️ Loading Error</h2>
                        <p>Unable to load data. The system may still be initializing.</p>
                        <button class="btn" onclick="location.reload()">Retry</button>
                    </div>
                `;
            }
        }

        function renderDashboard(d) {
            const healthColor = d.health_score >= 80 ? 'green' : d.health_score >= 60 ? 'yellow' : 'red';
            const tm = d.trade_metrics || {};
            const rm = d.risk_metrics || {};
            
            document.getElementById('app').innerHTML = `
                <div class="health-card">
                    <div class="card-label">System Health Score</div>
                    <div class="health-score ${healthColor}">${d.health_score || 0}/100</div>
                    <div style="font-size: 18px; margin-top: 10px;">
                        ${d.kill_switch?.recommendation || 'CONTINUE TRADING'}
                    </div>
                    ${d.kill_switch?.active ? `
                        <div style="margin-top: 20px; padding: 15px; background: rgba(239,68,68,0.3); border-radius: 10px;">
                            <strong>⚠️ SYSTEM PAUSED</strong><br>
                            ${d.kill_switch.reasons?.join(' • ') || ''}
                        </div>
                    ` : ''}
                </div>

                <div class="grid">
                    <div class="card">
                        <div class="card-label">Portfolio Value</div>
                        <div class="card-value">$${(d.current_value || 0).toLocaleString()}</div>
                        <div class="card-subvalue">Initial: $${(d.initial_capital || 0).toLocaleString()}</div>
                    </div>
                    
                    <div class="card">
                        <div class="card-label">Total Return</div>
                        <div class="card-value" style="color: ${d.total_return_pct >= 0 ? '#10b981' : '#ef4444'}">
                            ${(d.total_return_pct || 0) >= 0 ? '+' : ''}${(d.total_return_pct || 0).toFixed(2)}%
                        </div>
                        <div class="card-subvalue">$${(d.total_profit_usd || 0).toLocaleString()}</div>
                    </div>
                    
                    <div class="card">
                        <div class="card-label">Win Rate</div>
                        <div class="card-value">${(tm.win_rate || 0).toFixed(1)}%</div>
                        <div class="card-subvalue">${tm.winning_trades || 0}W / ${tm.losing_trades || 0}L</div>
                    </div>
                    
                    <div class="card">
                        <div class="card-label">Profit Factor</div>
                        <div class="card-value">${(tm.profit_factor || 0).toFixed(2)}</div>
                        <div class="card-subvalue">
                            ${tm.profit_factor >= 1.5 ? 'Excellent' : tm.profit_factor >= 1 ? 'Good' : 'Poor'}
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">📊 Performance Metrics</div>
                    <div class="grid">
                        <div class="card">
                            <div class="card-label">Expectancy</div>
                            <div class="card-value">$${(tm.expectancy || 0).toFixed(2)}</div>
                            <div class="card-subvalue">Per trade</div>
                        </div>
                        <div class="card">
                            <div class="card-label">Avg Winner</div>
                            <div class="card-value" style="color: #10b981">$${(tm.avg_winner || 0).toFixed(2)}</div>
                            <div class="card-subvalue">Per winning trade</div>
                        </div>
                        <div class="card">
                            <div class="card-label">Avg Loser</div>
                            <div class="card-value" style="color: #ef4444">$${(tm.avg_loser || 0).toFixed(2)}</div>
                            <div class="card-subvalue">Per losing trade</div>
                        </div>
                        <div class="card">
                            <div class="card-label">Current Streak</div>
                            <div class="card-value">${tm.consecutive_wins || 0}W / ${tm.consecutive_losses || 0}L</div>
                            <div class="card-subvalue">Wins / Losses</div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">⚠️ Risk Metrics</div>
                    <div class="grid">
                        <div class="card">
                            <div class="card-label">Current Drawdown</div>
                            <div class="card-value">${(rm.current_drawdown_pct || 0).toFixed(2)}%</div>
                            <div class="card-subvalue">$${(rm.current_drawdown_usd || 0).toFixed(2)}</div>
                        </div>
                        <div class="card">
                            <div class="card-label">Max Drawdown</div>
                            <div class="card-value">${(rm.max_drawdown_pct || 0).toFixed(2)}%</div>
                            <div class="card-subvalue">$${(rm.max_drawdown_usd || 0).toFixed(2)}</div>
                        </div>
                        <div class="card">
                            <div class="card-label">Sharpe Ratio</div>
                            <div class="card-value">${(rm.sharpe_ratio || 0).toFixed(2)}</div>
                            <div class="card-subvalue">Risk-adjusted</div>
                        </div>
                        <div class="card">
                            <div class="card-label">Volatility</div>
                            <div class="card-value">${(rm.volatility || 0).toFixed(2)}%</div>
                            <div class="card-subvalue">Daily std dev</div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">🌐 Market Regime</div>
                    <div style="text-align: center; padding: 20px;">
                        <div style="font-size: 28px; font-weight: bold; margin-bottom: 10px;">
                            ${d.market_regime?.regime || 'UNKNOWN'}
                        </div>
                        <div style="font-size: 18px; margin-bottom: 10px;">
                            Confidence: ${d.market_regime?.confidence || 0}%
                        </div>
                        <div style="opacity: 0.9;">
                            ${d.market_regime?.description || 'Analyzing market conditions...'}
                        </div>
                    </div>
                </div>

                <button class="btn" onclick="location.reload()">🔄 Refresh Dashboard</button>

                <div class="footer">
                    Last updated: ${new Date(d.last_updated).toLocaleString()}<br>
                    Running for ${d.days_running || 0} days • ${d.total_trades || 0} total trades<br>
                    Professional Trading System v2.0
                </div>
            `;
        }

        // Initial load
        loadData();

        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
