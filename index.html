<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAYR Options Trading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        .value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .subvalue {
            font-size: 14px;
            opacity: 0.9;
        }
        .health {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .health-score {
            font-size: 80px;
            font-weight: bold;
            margin: 20px 0;
        }
        .section {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        th {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .btn {
            background: rgba(255,255,255,0.3);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn:hover {
            background: rgba(255,255,255,0.4);
        }
        .loading {
            text-align: center;
            padding: 100px;
            font-size: 24px;
        }
        .error {
            background: rgba(239, 68, 68, 0.3);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 RAYR OPTIONS PRO</h1>
        <div class="subtitle">Professional Options Trading System</div>
        <div id="app">
            <div class="loading">Loading data...</div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/Rayr-06/rayr-options/main/data/analytics.json?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to load data');
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                document.getElementById('app').innerHTML = `
                    <div class="error">
                        <h2>⚠️ Error Loading Data</h2>
                        <p>${error.message}</p>
                        <button class="btn" onclick="location.reload()">Retry</button>
                    </div>
                `;
            }
        }

        function fmt(num) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 0
            }).format(num);
        }

        function pct(num) {
            return (num >= 0 ? '+' : '') + num.toFixed(2) + '%';
        }

        function renderDashboard(d) {
            const tm = d.trade_metrics || {};
            const rm = d.risk_metrics || {};
            
            document.getElementById('app').innerHTML = `
                <!-- Health Score -->
                <div class="health">
                    <div class="label">System Health Score</div>
                    <div class="health-score">${d.health_score || 0}/100</div>
                    <div>${d.kill_switch?.recommendation || 'CONTINUE TRADING'}</div>
                    ${d.kill_switch?.active ? `
                        <div style="margin-top: 15px; padding: 15px; background: rgba(239,68,68,0.3); border-radius: 10px;">
                            <strong>⚠️ PAUSED:</strong> ${d.kill_switch.reasons?.join(', ') || 'Review required'}
                        </div>
                    ` : ''}
                </div>

                <!-- Account Summary -->
                <div class="grid">
                    <div class="card">
                        <div class="label">Portfolio Value</div>
                        <div class="value">${fmt(d.current_value || 0)}</div>
                        <div class="subvalue">Initial: ${fmt(d.initial_capital || 0)}</div>
                    </div>
                    
                    <div class="card">
                        <div class="label">Total Return</div>
                        <div class="value">${pct(d.total_return_pct || 0)}</div>
                        <div class="subvalue">${fmt(d.total_profit_usd || 0)}</div>
                    </div>
                    
                    <div class="card">
                        <div class="label">Win Rate</div>
                        <div class="value">${(tm.win_rate || 0).toFixed(1)}%</div>
                        <div class="subvalue">${tm.winning_trades || 0}W / ${tm.losing_trades || 0}L</div>
                    </div>
                    
                    <div class="card">
                        <div class="label">Profit Factor</div>
                        <div class="value">${(tm.profit_factor || 0).toFixed(2)}</div>
                        <div class="subvalue">${tm.profit_factor >= 1.5 ? 'Excellent' : tm.profit_factor >= 1 ? 'Good' : 'Poor'}</div>
                    </div>
                </div>

                <!-- Performance Metrics -->
                <div class="grid">
                    <div class="card">
                        <div class="label">Expectancy</div>
                        <div class="value">${fmt(tm.expectancy || 0)}</div>
                        <div class="subvalue">Per trade</div>
                    </div>
                    
                    <div class="card">
                        <div class="label">Avg Winner</div>
                        <div class="value">${fmt(tm.avg_winner || 0)}</div>
                        <div class="subvalue">Per winning trade</div>
                    </div>
                    
                    <div class="card">
                        <div class="label">Avg Loser</div>
                        <div class="value">${fmt(tm.avg_loser || 0)}</div>
                        <div class="subvalue">Per losing trade</div>
                    </div>
                    
                    <div class="card">
                        <div class="label">Streak</div>
                        <div class="value">${tm.consecutive_wins || 0}W / ${tm.consecutive_losses || 0}L</div>
                        <div class="subvalue">Current</div>
                    </div>
                </div>

                <!-- Risk Metrics -->
                <div class="section">
                    <div class="section-title">⚠️ Risk Metrics</div>
                    <div class="grid">
                        <div class="card">
                            <div class="label">Current Drawdown</div>
                            <div class="value">${(rm.current_drawdown_pct || 0).toFixed(2)}%</div>
                            <div class="subvalue">${fmt(rm.current_drawdown_usd || 0)}</div>
                        </div>
                        
                        <div class="card">
                            <div class="label">Max Drawdown</div>
                            <div class="value">${(rm.max_drawdown_pct || 0).toFixed(2)}%</div>
                            <div class="subvalue">${fmt(rm.max_drawdown_usd || 0)}</div>
                        </div>
                        
                        <div class="card">
                            <div class="label">Sharpe Ratio</div>
                            <div class="value">${(rm.sharpe_ratio || 0).toFixed(2)}</div>
                            <div class="subvalue">Risk-adjusted return</div>
                        </div>
                        
                        <div class="card">
                            <div class="label">Volatility</div>
                            <div class="value">${(rm.volatility || 0).toFixed(2)}%</div>
                            <div class="subvalue">Daily std deviation</div>
                        </div>
                    </div>
                </div>

                <!-- Ticker Performance -->
                <div class="section">
                    <div class="section-title">🎯 Ticker Performance</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Symbol</th>
                                <th>Trades</th>
                                <th>Win Rate</th>
                                <th>Total P&L</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.entries(d.ticker_performance || {}).map(([sym, perf]) => `
                                <tr>
                                    <td><strong>${sym}</strong></td>
                                    <td>${perf.trades || 0}</td>
                                    <td>${(perf.win_rate || 0).toFixed(1)}%</td>
                                    <td>${fmt(perf.total_pnl || 0)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <!-- Recent Trades -->
                <div class="section">
                    <div class="section-title">📝 Recent Trades (${d.recent_trades?.length || 0})</div>
                    ${!d.recent_trades || d.recent_trades.length === 0 ? 
                        '<p style="text-align: center; padding: 30px; opacity: 0.7;">No trades yet</p>' :
                        `<table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Symbol</th>
                                    <th>Strike</th>
                                    <th>Premium</th>
                                    <th>Return</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${d.recent_trades.slice(0, 10).map(t => `
                                    <tr>
                                        <td>${new Date(t.timestamp).toLocaleString('en-US', {month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'})}</td>
                                        <td><strong>${t.symbol}</strong></td>
                                        <td>$${t.strike.toFixed(2)}</td>
                                        <td>$${t.premium.toFixed(2)}</td>
                                        <td>${pct(t.return_pct)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>`
                    }
                </div>

                <!-- Market Regime -->
                <div class="section">
                    <div class="section-title">🌐 Market Regime</div>
                    <div style="text-align: center; padding: 20px;">
                        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">
                            ${d.market_regime?.regime || 'UNKNOWN'}
                        </div>
                        <div style="font-size: 16px; opacity: 0.9;">
                            Confidence: ${d.market_regime?.confidence || 0}%
                        </div>
                        <div style="margin-top: 15px; opacity: 0.8;">
                            ${d.market_regime?.description || 'Analyzing market conditions...'}
                        </div>
                    </div>
                </div>

                <!-- Refresh -->
                <button class="btn" onclick="location.reload()">🔄 Refresh Dashboard</button>

                <!-- Footer -->
                <div style="text-align: center; margin-top: 30px; opacity: 0.8; font-size: 13px;">
                    Last updated: ${new Date(d.last_updated).toLocaleString()}<br>
                    Running for ${d.days_running || 0} days • ${d.total_trades || 0} total trades
                </div>
            `;
        }

        // Load on page load
        loadData();

        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
