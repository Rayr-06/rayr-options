<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAYR Options - Professional Trading System</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
            padding: 12px;
            font-size: 13px;
            line-height: 1.4;
        }
        
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        
        .header h1 { 
            font-size: 20px; 
            font-weight: 700;
        }
        
        .live-badge { 
            background: #10b981;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* Health Score */
        .health-section {
            background: #1a1f3a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .health-score {
            font-size: 48px;
            font-weight: 700;
            margin: 8px 0;
        }
        
        .health-score.green { color: #10b981; }
        .health-score.yellow { color: #f59e0b; }
        .health-score.red { color: #ef4444; }
        
        .health-status {
            font-size: 16px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .stat-card {
            background: #1a1f3a;
            border-radius: 10px;
            padding: 12px;
            border-left: 3px solid #667eea;
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
        }
        
        .stat-card.positive { border-left-color: #10b981; }
        .stat-card.negative { border-left-color: #ef4444; }
        .stat-card.warning { border-left-color: #f59e0b; }
        
        .stat-label {
            font-size: 10px;
            color: #9ca3af;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        
        .stat-value.large { font-size: 26px; }
        .stat-value.green { color: #10b981; }
        .stat-value.red { color: #ef4444; }
        .stat-value.yellow { color: #f59e0b; }
        
        .stat-change {
            font-size: 11px;
            color: #9ca3af;
        }
        
        /* Section */
        .section {
            background: #1a1f3a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .section-header {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            background: #374151;
            color: #9ca3af;
            font-weight: 600;
        }
        
        .badge.success { background: #10b981; color: white; }
        .badge.danger { background: #ef4444; color: white; }
        .badge.warning { background: #f59e0b; color: white; }
        
        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 2px solid #374151;
            color: #9ca3af;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #374151;
            font-size: 12px;
        }
        
        tr:hover { background: #0f1629; }
        
        /* Alert */
        .alert {
            background: #7f1d1d;
            border-left: 4px solid #ef4444;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            animation: alertPulse 2s infinite;
        }
        
        @keyframes alertPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.9; }
        }
        
        .alert-title {
            font-weight: 700;
            margin-bottom: 4px;
            font-size: 14px;
        }
        
        /* Button */
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }
        
        .btn:hover { background: #5568d3; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        
        .spinner {
            border: 3px solid #374151;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Footer */
        .footer {
            text-align: center;
            color: #6b7280;
            font-size: 11px;
            margin-top: 20px;
            padding: 16px;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-value { font-size: 20px; }
            .stat-value.large { font-size: 24px; }
            .health-score { font-size: 42px; }
            
            table { font-size: 11px; }
            th, td { padding: 8px 6px; }
        }
    </style>
</head>
<body>
    <div id="app" class="container"></div>
    
    <script>
        const API_BASE = 'https://raw.githubusercontent.com/Rayr-06/rayr-options/main';
        
        async function fetchData() {
            try {
                const timestamp = Date.now();
                const analyticsRes = await fetch(`${API_BASE}/data/analytics.json?t=${timestamp}`);
                const analytics = await analyticsRes.json();
                return analytics;
            } catch (error) {
                console.error('Error:', error);
                return null;
            }
        }
        
        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        }
        
        function formatPercent(value) {
            const sign = value >= 0 ? '+' : '';
            return sign + value.toFixed(2) + '%';
        }
        
        function formatDate(isoString) {
            return new Date(isoString).toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function getHealthColor(score) {
            if (score >= 80) return 'green';
            if (score >= 60) return 'yellow';
            return 'red';
        }
        
        function getHealthStatus(score) {
            if (score >= 80) return '✅ HEALTHY - Continue Trading';
            if (score >= 60) return '⚠️ CAUTION - Monitor Closely';
            return '🛑 PAUSE - Review Required';
        }
        
        function render(data) {
            const app = document.getElementById('app');
            
            if (!data) {
                app.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading professional trading dashboard...</p>
                    </div>
                `;
                return;
            }
            
            const tm = data.trade_metrics;
            const rm = data.risk_metrics;
            const healthColor = getHealthColor(data.health_score);
            const healthStatus = getHealthStatus(data.health_score);
            
            const totalReturnClass = data.total_return_pct >= 0 ? 'positive' : 'negative';
            const totalReturnColor = data.total_return_pct >= 0 ? 'green' : 'red';
            
            app.innerHTML = `
                <!-- Header -->
                <div class="header">
                    <h1>📊 RAYR OPTIONS PRO</h1>
                    <div class="live-badge">● LIVE</div>
                </div>
                
                <!-- Kill Switch Alert -->
                ${data.kill_switch.active ? `
                    <div class="alert">
                        <div class="alert-title">🛑 TRADING PAUSED</div>
                        <div>${data.kill_switch.reasons.join(' • ')}</div>
                        <div style="margin-top: 8px; font-weight: 600;">${data.kill_switch.recommendation}</div>
                    </div>
                ` : ''}
                
                <!-- Health Score -->
                <div class="health-section">
                    <div class="stat-label">System Health Score</div>
                    <div class="health-score ${healthColor}">${data.health_score}/100</div>
                    <div class="health-status">${healthStatus}</div>
                    <div style="margin-top: 8px; font-size: 11px; color: #9ca3af;">
                        Regime: ${data.market_regime.regime} (${data.market_regime.confidence}%)
                    </div>
                </div>
                
                <!-- Account Summary -->
                <div class="section-header" style="margin-bottom: 12px;">
                    <span>💰 Account Summary</span>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card ${totalReturnClass}">
                        <div class="stat-label">Portfolio Value</div>
                        <div class="stat-value large">${formatCurrency(data.current_value)}</div>
                        <div class="stat-change">Start: ${formatCurrency(data.initial_capital)}</div>
                    </div>
                    
                    <div class="stat-card ${totalReturnClass}">
                        <div class="stat-label">Total Return</div>
                        <div class="stat-value large ${totalReturnColor}">${formatPercent(data.total_return_pct)}</div>
                        <div class="stat-change">${formatCurrency(data.total_profit_usd)}</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Cash</div>
                        <div class="stat-value">${formatCurrency(data.current_cash)}</div>
                        <div class="stat-change">Available</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Equity</div>
                        <div class="stat-value">${formatCurrency(data.equity)}</div>
                        <div class="stat-change">In positions</div>
                    </div>
                </div>
                
                <!-- Performance Metrics -->
                <div class="section-header" style="margin-bottom: 12px;">
                    <span>📈 Performance Metrics</span>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card ${tm.win_rate >= 60 ? 'positive' : tm.win_rate >= 40 ? 'warning' : 'negative'}">
                        <div class="stat-label">Win Rate</div>
                        <div class="stat-value">${tm.win_rate.toFixed(1)}%</div>
                        <div class="stat-change">${tm.winning_trades}W / ${tm.losing_trades}L</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Avg Winner</div>
                        <div class="stat-value green">${formatCurrency(tm.avg_winner)}</div>
                        <div class="stat-change">Per trade</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Avg Loser</div>
                        <div class="stat-value red">${formatCurrency(tm.avg_loser)}</div>
                        <div class="stat-change">Per trade</div>
                    </div>
                    
                    <div class="stat-card ${tm.expectancy >= 0 ? 'positive' : 'negative'}">
                        <div class="stat-label">Expectancy</div>
                        <div class="stat-value ${tm.expectancy >= 0 ? 'green' : 'red'}">${formatCurrency(tm.expectancy)}</div>
                        <div class="stat-change">Per trade</div>
                    </div>
                    
                    <div class="stat-card ${tm.profit_factor >= 1.5 ? 'positive' : tm.profit_factor >= 1.0 ? 'warning' : 'negative'}">
                        <div class="stat-label">Profit Factor</div>
                        <div class="stat-value">${tm.profit_factor.toFixed(2)}</div>
                        <div class="stat-change">${tm.profit_factor >= 1.5 ? 'Excellent' : tm.profit_factor >= 1.0 ? 'Good' : 'Poor'}</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Consecutive</div>
                        <div class="stat-value">${tm.consecutive_wins}W / ${tm.consecutive_losses}L</div>
                        <div class="stat-change">Current streak</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Daily Return</div>
                        <div class="stat-value ${data.daily_return_pct >= 0 ? 'green' : 'red'}">${formatPercent(data.daily_return_pct)}</div>
                        <div class="stat-change">Average</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Weekly Return</div>
                        <div class="stat-value ${data.weekly_return_pct >= 0 ? 'green' : 'red'}">${formatPercent(data.weekly_return_pct)}</div>
                        <div class="stat-change">Average</div>
                    </div>
                </div>
                
                <!-- Risk Metrics -->
                <div class="section">
                    <div class="section-header">
                        <span>⚠️ Risk Metrics</span>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card ${rm.current_drawdown_pct > 5 ? 'negative' : 'positive'}">
                            <div class="stat-label">Current Drawdown</div>
                            <div class="stat-value ${rm.current_drawdown_pct > 5 ? 'red' : 'green'}">${rm.current_drawdown_pct.toFixed(2)}%</div>
                            <div class="stat-change">${formatCurrency(rm.current_drawdown_usd)}</div>
                        </div>
                        
                        <div class="stat-card ${rm.max_drawdown_pct > 10 ? 'negative' : 'warning'}">
                            <div class="stat-label">Max Drawdown</div>
                            <div class="stat-value">${rm.max_drawdown_pct.toFixed(2)}%</div>
                            <div class="stat-change">${formatCurrency(rm.max_drawdown_usd)}</div>
                        </div>
                        
                        <div class="stat-card">
                            <div class="stat-label">Sharpe Ratio</div>
                            <div class="stat-value">${rm.sharpe_ratio.toFixed(2)}</div>
                            <div class="stat-change">Risk-adjusted</div>
                        </div>
                        
                        <div class="stat-card">
                            <div class="stat-label">Volatility</div>
                            <div class="stat-value">${rm.volatility.toFixed(2)}%</div>
                            <div class="stat-change">Daily std dev</div>
                        </div>
                    </div>
                </div>
                
                <!-- Ticker Performance -->
                <div class="section">
                    <div class="section-header">
                        <span>🎯 Performance by Ticker</span>
                    </div>
                    
                    <table>
                        <thead>
                            <tr>
                                <th>Ticker</th>
                                <th>Trades</th>
                                <th>Win Rate</th>
                                <th>Total P&L</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.entries(data.ticker_performance).map(([symbol, perf]) => `
                                <tr>
                                    <td style="font-weight: 700;">${symbol}</td>
                                    <td>${perf.trades}</td>
                                    <td>${perf.win_rate.toFixed(1)}%</td>
                                    <td style="color: ${perf.total_pnl >= 0 ? '#10b981' : '#ef4444'}">
                                        ${formatCurrency(perf.total_pnl)}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                
                <!-- Time of Day Performance -->
                <div class="section">
                    <div class="section-header">
                        <span>🕐 Performance by Time of Day</span>
                    </div>
                    
                    <table>
                        <thead>
                            <tr>
                                <th>Period</th>
                                <th>Trades</th>
                                <th>Win Rate</th>
                                <th>Avg Return</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.entries(data.time_performance).map(([period, perf]) => `
                                <tr>
                                    <td style="font-weight: 700; text-transform: capitalize;">${period}</td>
                                    <td>${perf.trades}</td>
                                    <td>${perf.win_rate.toFixed(1)}%</td>
                                    <td style="color: ${perf.avg_return >= 0 ? '#10b981' : '#ef4444'}">
                                        ${perf.avg_return.toFixed(2)}%
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                
                <!-- Recent Trades -->
                <div class="section">
                    <div class="section-header">
                        <span>📝 Recent Trades</span>
                        <span class="badge">${data.recent_trades.length}</span>
                    </div>
                    
                    ${data.recent_trades.length === 0 ? 
                        '<p style="text-align: center; color: #9ca3af; padding: 30px;">No trades yet</p>' :
                        `
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Symbol</th>
                                    <th>Strike</th>
                                    <th>Premium</th>
                                    <th>Return</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.recent_trades.map(trade => `
                                    <tr>
                                        <td>${formatDate(trade.timestamp)}</td>
                                        <td style="font-weight: 700;">${trade.symbol}</td>
                                        <td>$${trade.strike.toFixed(2)}</td>
                                        <td>$${trade.premium.toFixed(2)}</td>
                                        <td style="color: ${trade.return_pct >= 0.5 ? '#10b981' : '#f59e0b'}">
                                            ${formatPercent(trade.return_pct)}
                                        </td>
                                        <td>
                                            <span class="badge ${trade.status === 'filled' ? 'success' : ''}">${trade.status}</span>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        `
                    }
                </div>
                
                <!-- Refresh Button -->
                <button class="btn" onclick="location.reload()">
                    🔄 Refresh Dashboard
                </button>
                
                <!-- Footer -->
                <div class="footer">
                    Last updated: ${formatDate(data.last_updated)}<br>
                    Running for ${data.days_running} days • ${data.total_trades} total trades<br>
                    Automated via GitHub Actions
                </div>
            `;
        }
        
        // Initial load
        fetchData().then(render);
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            fetchData().then(render);
        }, 30000);
    </script>
</body>
</html>
